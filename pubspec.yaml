name: routineapp
description: "A Flutter Project that creates a schedule and uploads it to a user's watch to act as notification reminders"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  supabase_flutter: ^2.0.0
  mqtt_client: ^10.2.1
  intl: ^0.20.2
  timezone: ^0.11.0  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
